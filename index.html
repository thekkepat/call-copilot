<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Call Co-pilot</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f0f0f; color: #e8e8e8; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
.topbar { display: flex; align-items: center; gap: 12px; padding: 12px 20px; border-bottom: 1px solid #222; background: #0f0f0f; flex-shrink: 0; }
.logo { font-size: 13px; font-weight: 600; letter-spacing: 0.06em; color: #888; white-space: nowrap; }
.logo span { color: #e8e8e8; }
.spacer { flex: 1; }
.ctx-label { font-size: 12px; color: #555; white-space: nowrap; }
select { height: 32px; font-size: 13px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px; color: #e8e8e8; padding: 0 10px; min-width: 200px; }
select:focus { outline: none; border-color: #444; }
.record-btn { display: flex; align-items: center; gap: 8px; height: 32px; padding: 0 16px; border-radius: 6px; border: 1px solid #2a2a2a; background: transparent; color: #e8e8e8; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; transition: background 0.15s, border-color 0.15s; }
.record-btn:hover { background: #1a1a1a; }
.record-btn.active { background: rgba(220,38,38,0.1); border-color: rgba(220,38,38,0.4); color: #f87171; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: #555; flex-shrink: 0; }
.dot.live { background: #ef4444; animation: pulse 1.2s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.25; } }
.panels { display: flex; flex: 1; overflow: hidden; }
.panel { display: flex; flex-direction: column; overflow: hidden; }
.panel-left { flex: 1.1; border-right: 1px solid #1e1e1e; }
.panel-right { flex: 0.9; }
.panel-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid #1a1a1a; flex-shrink: 0; }
.panel-title { font-size: 10px; font-weight: 600; color: #444; letter-spacing: 0.08em; text-transform: uppercase; }
.refresh-btn { height: 26px; padding: 0 12px; font-size: 12px; border-radius: 5px; border: 1px solid #2a2a2a; background: transparent; color: #666; cursor: pointer; transition: background 0.12s, color 0.12s; }
.refresh-btn:hover:not(:disabled) { background: #1a1a1a; color: #aaa; }
.refresh-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.auto-hint { font-size: 11px; color: #333; }
.transcript-body { flex: 1; overflow-y: auto; padding: 16px; font-size: 14px; line-height: 1.8; color: #c8c8c8; }
.transcript-body::-webkit-scrollbar { width: 4px; }
.transcript-body::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
.interim { color: #444; font-style: italic; }
.placeholder { color: #333; font-style: italic; }
.word-count { font-size: 11px; color: #333; padding: 6px 16px; border-top: 1px solid #1a1a1a; flex-shrink: 0; }
.questions-body { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
.questions-body::-webkit-scrollbar { width: 4px; }
.questions-body::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
.q-card { background: #161616; border-radius: 7px; padding: 10px 13px; font-size: 13.5px; line-height: 1.55; color: #d0d0d0; border: 1px solid #222; cursor: pointer; transition: background 0.1s, border-color 0.1s; animation: fadeUp 0.25s ease; }
.q-card:hover { background: #1c1c1c; border-color: #333; }
.q-card.copied { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.05); }
@keyframes fadeUp { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:none; } }
.q-num { font-size: 10px; font-weight: 600; color: #333; letter-spacing: 0.05em; margin-bottom: 4px; text-transform: uppercase; }
.q-placeholder { color: #333; font-size: 13px; font-style: italic; padding: 16px; line-height: 1.7; }
.spinner-wrap { display: flex; align-items: center; gap: 10px; padding: 16px; color: #444; font-size: 13px; }
.spinner { width: 14px; height: 14px; border: 1.5px solid #2a2a2a; border-top-color: #555; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform:rotate(360deg); } }
.status-bar { padding: 6px 16px; font-size: 11px; color: #333; border-top: 1px solid #1a1a1a; flex-shrink: 0; min-height: 26px; }
.ctx-tag { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 99px; margin-bottom: 6px; background: #1e1e1e; color: #555; letter-spacing: 0.04em; text-transform: uppercase; }
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">call·<span>copilot</span></div>
  <div class="spacer"></div>
  <span class="ctx-label">Call type</span>
  <select id="ctx">
    <option value="client discovery">Client discovery</option>
    <option value="executive stakeholder">Executive stakeholder</option>
    <option value="sales">Sales</option>
    <option value="job interview">Job interview</option>
    <option value="investor meeting">Investor meeting</option>
    <option value="team 1:1">Team 1:1</option>
    <option value="negotiation">Negotiation</option>
    <option value="general conversation">General conversation</option>
    <option value="vendor pitch">Vendor pitch</option>
  </select>
  <button class="record-btn" id="recBtn" onclick="toggleRecording()">
    <span class="dot" id="dot"></span>
    <span id="recLabel">Start listening</span>
  </button>
</div>
<div class="panels">
  <div class="panel panel-left">
    <div class="panel-header">
      <span class="panel-title">Live transcript</span>
      <span class="auto-hint" id="autoHint"></span>
    </div>
    <div class="transcript-body" id="transcript">
      <span class="placeholder">Start listening to begin transcribing your call...</span>
    </div>
    <div class="word-count" id="wordCount"></div>
  </div>
  <div class="panel panel-right">
    <div class="panel-header">
      <span class="panel-title">Suggested questions</span>
      <button class="refresh-btn" id="refreshBtn" onclick="fetchQuestions()" disabled>Refresh</button>
    </div>
    <div class="questions-body" id="questions">
      <p class="q-placeholder">Questions will appear here as the conversation unfolds.</p>
    </div>
    <div class="status-bar" id="statusBar"></div>
  </div>
</div>
<script>
let recognition=null,isRecording=false,finalTranscript='',interimTranscript='',wordCount=0,lastRefreshWords=0,isFetching=false;
const AUTO_REFRESH_WORDS=60;
function getCtx(){return document.getElementById('ctx').value;}
function toggleRecording(){if(!isRecording)startRecording();else stopRecording();}
function startRecording(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){setStatus('Speech recognition not supported — use Chrome or Edge.');return;}
  recognition=new SR();recognition.continuous=true;recognition.interimResults=true;recognition.lang='en-US';
  recognition.onresult=(e)=>{
    interimTranscript='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      const t=e.results[i][0].transcript;
      if(e.results[i].isFinal)finalTranscript+=t+' ';else interimTranscript=t;
    }
    renderTranscript();countWords();checkAutoRefresh();
  };
  recognition.onerror=(e)=>{if(e.error!=='no-speech')setStatus('Mic error: '+e.error);};
  recognition.onend=()=>{if(isRecording)recognition.start();};
  recognition.start();isRecording=true;
  document.getElementById('recBtn').classList.add('active');
  document.getElementById('recLabel').textContent='Listening...';
  document.getElementById('dot').classList.add('live');
  document.getElementById('refreshBtn').disabled=true;
  setStatus('Listening — speak clearly near your mic.');
}
function stopRecording(){
  if(recognition){recognition.onend=null;recognition.stop();}
  isRecording=false;
  document.getElementById('recBtn').classList.remove('active');
  document.getElementById('recLabel').textContent='Start listening';
  document.getElementById('dot').classList.remove('live');
  document.getElementById('autoHint').textContent='';
  if(finalTranscript.trim()){document.getElementById('refreshBtn').disabled=false;setStatus('Stopped. Click Refresh to update questions.');}
  else setStatus('');
}
function renderTranscript(){
  const el=document.getElementById('transcript');
  el.innerHTML=(finalTranscript?'<span>'+esc(finalTranscript)+'</span>':'')+(interimTranscript?'<span class="interim">'+esc(interimTranscript)+'</span>':'');
  el.scrollTop=el.scrollHeight;
}
function countWords(){
  const full=finalTranscript+' '+interimTranscript;
  wordCount=full.trim().split(/\s+/).filter(Boolean).length;
  document.getElementById('wordCount').textContent=wordCount>0?wordCount+' words':'';
}
function checkAutoRefresh(){
  const since=wordCount-lastRefreshWords;
  const remaining=AUTO_REFRESH_WORDS-since;
  if(remaining>0&&since>0)document.getElementById('autoHint').textContent='auto in ~'+remaining+'w';
  if(since>=AUTO_REFRESH_WORDS&&!isFetching){lastRefreshWords=wordCount;document.getElementById('autoHint').textContent='';fetchQuestions();}
}
async function fetchQuestions(){
  const transcript=finalTranscript.trim();
  if(!transcript||isFetching)return;
  isFetching=true;
  document.getElementById('refreshBtn').disabled=true;
  document.getElementById('questions').innerHTML='<div class="spinner-wrap"><div class="spinner"></div><span>Generating questions...</span></div>';
  setStatus('Analyzing...');
  const ctx=getCtx();
  const isVendor=ctx==='vendor pitch';
  const prompt=isVendor
    ?`You are a Strategic Vendor Analyst Co-Pilot acting as a critical friend during a live vendor sales pitch. Analyze this transcript through three lenses: (1) Reality Check — verify claims, client references, "unique" or "first-to-market" features; (2) Black Box Drill-Down — peel back buzzwords like "AI-driven", "seamless", "infinite scale" to expose the How, including data provenance, compliance (SOC2/HIPAA/GDPR), and interoperability; (3) Day 2 Specialist — uncover implementation friction, TCO, switching costs, and Time to Value the vendor is omitting.\n\nReturn a JSON array of up to 5 objects, each with keys: "flag" (the specific claim or buzzword, max 6 words), "context" (why it is a risk or gap, max 15 words), "question" (the exact phrase to say, under 25 words).\n\nOutput ONLY a valid JSON array, no markdown, no preamble.\n\nTranscript:\n"""\n${transcript.slice(-3000)}\n"""`
    :`You are a real-time call coach. Below is a live transcript from a ${ctx} call.\n\nSuggest 5 sharp, high-value questions the listener should ask RIGHT NOW.\n\nRules:\n- Questions must be grounded in what was actually said\n- Prioritize uncovering needs, motivations, blockers, or next steps\n- Each question must be distinct\n- Keep each question under 20 words\n- Output ONLY a JSON array of 5 strings, no markdown, no preamble\n\nTranscript:\n"""\n${transcript.slice(-3000)}\n"""`;
  try{
    const res=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,system:'Return only valid JSON. No explanation, no markdown fences.',messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const raw=data.content?.find(b=>b.type==='text')?.text||'[]';
    const clean=raw.replace(/```json|```/g,'').trim();
    const questions=JSON.parse(clean);
    renderQuestions(questions,ctx);
    setStatus('Updated '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}));
    lastRefreshWords=wordCount;
  }catch(err){
    document.getElementById('questions').innerHTML='<p class="q-placeholder">Could not generate questions. Check console for details.</p>';
    setStatus('Error — see browser console.');
    console.error('fetchQuestions error:',err);
  }
  isFetching=false;
  document.getElementById('refreshBtn').disabled=false;
}
function renderQuestions(qs,ctx){
  if(!Array.isArray(qs)||!qs.length){document.getElementById('questions').innerHTML='<p class="q-placeholder">No questions returned. Try refreshing.</p>';return;}
  const isVendor=ctx==='vendor pitch';
  document.getElementById('questions').innerHTML='<div class="ctx-tag">'+esc(ctx)+'</div>'+qs.map((q,i)=>{
    if(isVendor){
      return `<div class="q-card" onclick="copyQ(this,'${(q.question||'').replace(/'/g,"\\'")}')">
        <div class="q-num" style="color:#b45309">FLAG: ${esc(q.flag||'')}</div>
        <div style="font-size:11px;color:#555;margin:3px 0 6px">${esc(q.context||'')}</div>
        <div>${esc(q.question||'')}</div>
      </div>`;
    }
    return `<div class="q-card" onclick="copyQ(this,'${q.replace(/'/g,"\\'")}')"><div class="q-num">Q${i+1}</div><div>${esc(q)}</div></div>`;
  }).join('');
}
function copyQ(el,text){navigator.clipboard?.writeText(text).catch(()=>{});el.classList.add('copied');setTimeout(()=>el.classList.remove('copied'),900);}
function setStatus(msg){document.getElementById('statusBar').textContent=msg;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
</body>
</html>
